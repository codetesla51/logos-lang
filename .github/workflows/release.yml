name: Release

# Grant write permissions to repository contents so GoReleaser can create releases
permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          # distribution can be 'goreleaser' (default) or 'goreleaser-pro'
          distribution: goreleaser
          # use GoReleaser v2 series; you can pin a specific version like 'v0.192.0'
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
