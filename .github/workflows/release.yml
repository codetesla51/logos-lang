name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Install goreleaser (prebuilt)
        run: |
          set -eux
          ARCHIVE=/tmp/goreleaser.tar.gz
          # download prebuilt goreleaser for linux x86_64 (runner)
          curl -sSfL -o "$ARCHIVE" https://github.com/goreleaser/goreleaser/releases/latest/download/goreleaser_Linux_x86_64.tar.gz
          tar -xzf "$ARCHIVE" -C /tmp
          sudo mv /tmp/goreleaser /usr/local/bin/goreleaser

      - name: Run goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          goreleaser release --rm-dist
